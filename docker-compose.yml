networks:
  mcp_net:
    driver: bridge

services:
  # Caddy Reverse Proxy
  caddy:
    image: caddy:2
    container_name: mcp-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      - TAILNET_DOMAIN=${TAILNET_DOMAIN:-your-tailnet.ts.net}
      - TAILNET_MACHINE_NAME=${TAILNET_MACHINE_NAME:-mcp-server}
    networks:
      - mcp_net
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
      - ts_socket:/var/run/tailscale:ro  # Shared socket for TLS certs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:2019/config/"]
      interval: 10s
      timeout: 5s
      retries: 3

  # MCP Server
  mcp-server:
    build: .
    container_name: mcp-server
    expose:
      - "8000"
    networks:
      - mcp_net
    volumes:
      - ./docs_config.yaml:/app/docs_config.yaml:ro
      - ./docs_local:/app/docs_local:ro
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=${POSTGRES_DB:-mcp_server}
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - SEARXNG_URL=http://searxng:8080
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - MCP_PORT=${MCP_PORT:-8000}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-*}
    command: python -m src.mcp_sse
    depends_on:
      - postgres
      - searxng
      - redis
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  # Celery Worker (most memory intensive - 10 browsers)
  celery-worker:
    build: .
    container_name: mcp-celery-worker
    networks:
      - mcp_net
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=${POSTGRES_DB:-mcp_server}
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - SEARXNG_URL=http://searxng:8080
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    command: celery -A src.celery_app worker --loglevel=info --concurrency=10
    depends_on:
      - postgres
      - redis
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 3G
          cpus: '2.0'
        reservations:
          memory: 1G
          cpus: '0.5'
    healthcheck:
      test: ["CMD-SHELL", "celery -A src.celery_app inspect ping || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Flower
  flower:
    build: .
    container_name: mcp-flower
    networks:
      - mcp_net
    ports:
      - "127.0.0.1:5555:5555"
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    command: celery -A src.celery_app flower --port=5555 --broker=redis://redis:6379/0
    depends_on:
      - redis
      - celery-worker
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M

  # Celery Beat - Periodic Task Scheduler
  celery-beat:
    build: .
    container_name: mcp-celery-beat
    networks:
      - mcp_net
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=${POSTGRES_DB:-mcp_server}
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
    command: celery -A src.celery_app beat --loglevel=info
    depends_on:
      - redis
      - postgres
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M

  # SearXNG
  searxng:
    image: searxng/searxng:latest
    container_name: mcp-searxng
    hostname: searxng
    networks:
      - mcp_net
    volumes:
      - ./searxng-config-remote:/etc/searxng:ro
    environment:
      - SEARXNG_SECRET=${SEARXNG_SECRET}
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  # PostgreSQL
  postgres:
    image: postgres:16-alpine
    container_name: mcp-postgres
    networks:
      - mcp_net
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-mcp_server}
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  # Redis
  redis:
    image: redis:alpine
    container_name: mcp-redis
    networks:
      - mcp_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M

  # Tailscale Sidecar
  ts-sidecar:
    image: tailscale/tailscale:latest
    hostname: mcp-server
    container_name: mcp-ts
    privileged: true
    network_mode: host
    environment:
      - TS_AUTHKEY=${TS_AUTHKEY:-}
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_ARGS=--port=41641
      - TS_SOCKET_DIR=/tmp/tailscale  # Write socket to shared volume location
    volumes:
      - ts-data:/var/lib/tailscale
      - ts_socket:/tmp/tailscale  # Shared socket volume
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "sh", "-c", "tailscale status || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  postgres-data:
  ts-data:
  caddy_data:
  caddy_config:
  ts_socket:  # Shared volume for Tailscale socket
