networks:
  mcp_net:
    driver: bridge

services:
  # Caddy Reverse Proxy
  caddy:
    image: caddy:2
    container_name: mcp-caddy
    restart: unless-stopped
    network_mode: host  # Host network so Tailscale Funnel can reach 127.0.0.1:80
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:2019/config/"]
      interval: 10s
      timeout: 5s
      retries: 3

  # MCP Server (runs browser-based scraping - needs more memory)
  mcp-server:
    build: .
    container_name: mcp-server
    ports:
      - "8000:8000"  # Expose to all interfaces for tailnet access
    networks:
      - mcp_net
    volumes:
      - ./docs_config.yaml:/app/docs_config.yaml:ro
      - ./docs_local:/app/docs_local:ro
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=${POSTGRES_DB:-mcp_server}
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - SEARXNG_URL=http://searxng:8080
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - MCP_PORT=${MCP_PORT:-8000}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-*}
    command: python -m src.mcp_sse
    depends_on:
      - postgres
      - searxng
      - redis
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 8G
        reservations:
          memory: 2G
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  # Celery Worker (most memory intensive - 10 browsers)
  celery-worker:
    build: .
    container_name: mcp-celery-worker
    networks:
      - mcp_net
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=${POSTGRES_DB:-mcp_server}
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - SEARXNG_URL=http://searxng:8080
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    command: celery -A src.celery_app worker --loglevel=info --concurrency=10
    depends_on:
      - postgres
      - redis
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 3G
          cpus: '2.0'
        reservations:
          memory: 1G
          cpus: '0.5'
    healthcheck:
      test: ["CMD-SHELL", "celery -A src.celery_app inspect ping || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Flower
  flower:
    build: .
    container_name: mcp-flower
    networks:
      - mcp_net
    ports:
      - "127.0.0.1:5555:5555"
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    command: celery -A src.celery_app flower --port=5555 --broker=redis://redis:6379/0
    depends_on:
      - redis
      - celery-worker
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5555/"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M

  # Celery Beat - Periodic Task Scheduler
  celery-beat:
    build: .
    container_name: mcp-celery-beat
    networks:
      - mcp_net
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=${POSTGRES_DB:-mcp_server}
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
    command: celery -A src.celery_app beat --loglevel=info
    depends_on:
      - redis
      - postgres
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import subprocess; subprocess.run([\"celery\", \"-A\", \"src.celery_app\", \"inspect\", \"ping\"], capture_output=True)' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M

  # SearXNG
  searxng:
    image: searxng/searxng:latest
    container_name: mcp-searxng
    hostname: searxng
    networks:
      - mcp_net
    volumes:
      - ./searxng-config-remote:/etc/searxng:ro
    environment:
      - SEARXNG_SECRET=${SEARXNG_SECRET}
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8080/search || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  # PostgreSQL
  postgres:
    image: postgres:16-alpine
    container_name: mcp-postgres
    networks:
      - mcp_net
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-mcp_server}
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  # Redis
  redis:
    image: redis:alpine
    container_name: mcp-redis
    networks:
      - mcp_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M

