networks:
  mcp_net:
    name: lang-tools_mcp_net
    external: true

services:
  # =============================================================================
  # Llama.cpp LLM Server (FunctionGemma 270M UD-Q4_K_XL)
  # =============================================================================
  llama-llm:
    image: ghcr.io/ggml-org/llama.cpp:server
    container_name: llama-llm
    networks:
      - mcp_net
    volumes:
      - ./llm_models:/models:ro
    command:
      - --model
      - /models/functiongemma-270m-it-UD-Q4_K_XL.gguf
      - --port
      - "8080"
      - --host
      - 0.0.0.0
      - --ctx-size
      - "2048"
      - --parallel
      - "4"
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  # =============================================================================
  # Llama.cpp Embeddings Server (Jina v5-small-clustering IQ4_NL)
  # Uncomment when embeddings are needed
  # =============================================================================
  # llama-embeddings:
  #   image: ghcr.io/ggml-org/llama.cpp:server
  #   container_name: llama-embeddings
  #   networks:
  #     - mcp_net
  #   volumes:
  #     - ./llm_models:/models:ro
  #   command:
  #     - --model
  #     - /models/v5-small-clustering-IQ4_NL.gguf
  #     - --port
  #     - "8081"
  #     - --host
  #     - 0.0.0.0
  #     - --embeddings
  #     - --pooling
  #     - cls
  #     - --ctx-size
  #     - "512"
  #     - --ubatch-size
  #     - "512"
  #   restart: unless-stopped
  #   deploy:
  #     resources:
  #       limits:
  #         memory: 1G
  #       reservations:
  #         memory: 512M
  #   healthcheck:
  #     test: ["CMD", "curl", "-f", "http://localhost:8081/health"]
  #     interval: 10s
  #     timeout: 5s
  #     retries: 3

  # =============================================================================
  # Llama.cpp Reranker Server (Jina Reranker v3 IQ4_NL)
  # =============================================================================
  llama-reranker:
    image: ghcr.io/ggml-org/llama.cpp:server
    container_name: llama-reranker
    networks:
      - mcp_net
    volumes:
      - ./llm_models:/models:ro
    command:
      - --model
      - /models/jina-reranker-v3-IQ4_NL.gguf
      - --port
      - "8082"
      - --host
      - 0.0.0.0
      - --reranking
      - --embeddings
      - --pooling
      - rank
      - --ctx-size
      - "512"
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8082/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  # =============================================================================
  # Llama.cpp Router - Single entry point for all LLM services
  # =============================================================================
  llama-router:
    image: caddy:2
    container_name: llama-router
    networks:
      - mcp_net
    ports:
      - "8090:8080"
    volumes:
      - ./llama_router_Caddyfile:/etc/caddy/Caddyfile:ro
    restart: unless-stopped
    depends_on:
      - llama-llm
      # - llama-embeddings  # Uncomment when embeddings are needed
      - llama-reranker
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 3
