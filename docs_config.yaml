# ========== LOCAL SOURCES ==========
# For sites that don't have llms.txt, create your own locally
# Place files in /app/docs_local/ or use absolute paths

# Example: Local llms.txt for a project without official docs
# - name: MyProject
#   llms_txt: /app/docs_local/myproject_llms.txt

# Example: Using relative path (resolves against DOCS_LOCAL_DIR)
# - name: LocalDocs
#   llms_txt: local_llms.txt

