# Documentation sources for MCP docs tools
# Tools: docs_list_sources, docs_fetch_docs
#
# Remote sources (http:// or https://): Any URL is allowed
# Local sources: Must be absolute paths or paths relative to /app/docs_local
#   - Local files are checked for existence at startup
#   - Only files listed here are accessible (security)

